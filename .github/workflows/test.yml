name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: awo_plugin/xmtp_sidecar/package.json

      - name: Install plugin (dev)
        run: pip install -e ".[dev]"

      - name: Run offline test suite
        run: pytest -q

  sidecar-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: awo_plugin/xmtp_sidecar/package.json

      - name: Install sidecar deps
        working-directory: awo_plugin/xmtp_sidecar
        run: npm ci

      - name: TypeScript typecheck
        working-directory: awo_plugin/xmtp_sidecar
        run: npx tsc --noEmit
